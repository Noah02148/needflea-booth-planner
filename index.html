<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEED! FLEA — 摊位规划工具</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4f0;
    --bg2: #ffffff;
    --bg3: #ececea;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.2);
    --text: #1a1a18;
    --text2: #6b6b68;
    --text3: #9b9b98;
    --accent: #2a2a28;
    --green: #4BC98A;
    --toolbar-h: 52px;
    --sidebar-w: 200px;
    --statusbar-h: 28px;
  }
  body { font-family: 'PingFang SC', 'Helvetica Neue', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

  /* ── TOP BAR ── */
  #topbar {
    height: var(--toolbar-h);
    background: var(--accent);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  #topbar .logo { color: var(--green); font-size: 13px; font-weight: 600; letter-spacing: .08em; margin-right: 8px; }
  #topbar .logo span { color: var(--green); }
  .tb-sep { width: 1px; height: 24px; background: rgba(255,255,255,0.12); margin: 0 4px; }
  .tb-btn {
    height: 30px; padding: 0 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.85);
    font-size: 12px; cursor: pointer; white-space: nowrap; transition: all .15s;
    display: flex; align-items: center; gap: 5px;
  }
  .tb-btn:hover { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.25); }
  .tb-btn.active { background: var(--green); border-color: var(--green); color: #fff; }
  .tb-btn.danger { border-color: rgba(229,74,74,0.4); color: rgba(229,74,74,0.85); }
  .tb-btn.danger:hover { background: rgba(229,74,74,0.15); }
  .tb-btn.primary { background: var(--green); border-color: var(--green); color: #fff; }
  .tb-btn.primary:hover { background: #3ab87a; }
  #file-input { display: none; }
  .tb-spacer { flex: 1; }

  /* ── CAT PICKER ── */
  #cat-picker { display: flex; align-items: center; gap: 4px; }
  .cat-dot {
    width: 18px; height: 18px; border-radius: 4px; cursor: pointer;
    border: 2px solid transparent; transition: all .15s;
  }
  .cat-dot.active { border-color: #fff; transform: scale(1.15); }

  /* ── TOOLBAR SELECTS ── */
  #topbar select {
    height: 30px; padding: 0 8px; border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.85); font-size: 12px; cursor: pointer;
  }

  /* ── MAIN LAYOUT ── */
  #main { flex: 1; display: flex; overflow: hidden; }

  /* ── CANVAS AREA ── */
  #canvas-wrap {
    flex: 1; overflow: hidden; position: relative; background: #1e1e1e;
  }
  #canvas { display: block; cursor: crosshair; }
  
  /* ── CALIBRATION OVERLAY ── */
  #calib-overlay {
    display: none; position: absolute; inset: 0;
    background: rgba(0,0,0,0.55); z-index: 50;
    align-items: center; justify-content: center;
  }
  #calib-overlay.show { display: flex; }
  #calib-box {
    background: var(--bg2); border-radius: 12px; padding: 24px 28px;
    width: 340px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  #calib-box h3 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  #calib-box p { font-size: 12px; color: var(--text2); margin-bottom: 16px; line-height: 1.6; }
  #calib-box .step { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; font-size: 12px; }
  #calib-box .step-num { width: 20px; height: 20px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 10px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .calib-input-row { display: flex; align-items: center; gap: 8px; margin-top: 14px; }
  .calib-input-row label { font-size: 12px; color: var(--text2); white-space: nowrap; }
  .calib-input-row input { flex: 1; height: 32px; padding: 0 10px; border: 1px solid var(--border2); border-radius: 6px; font-size: 13px; }
  .calib-input-row span { font-size: 12px; color: var(--text2); }
  .calib-btns { display: flex; gap: 8px; margin-top: 16px; }
  .calib-btns button { flex: 1; height: 34px; border-radius: 7px; font-size: 13px; cursor: pointer; border: 1px solid var(--border2); }
  .calib-btns .ok { background: var(--accent); color: #fff; border-color: var(--accent); }
  .calib-btns .cancel { background: none; }
  #calib-status { font-size: 12px; color: var(--text3); margin-top: 10px; text-align: center; }

  /* ── SIDEBAR ── */
  #sidebar {
    width: var(--sidebar-w); border-left: 1px solid var(--border);
    background: var(--bg2); display: flex; flex-direction: column;
    overflow-y: auto; flex-shrink: 0;
  }
  .sidebar-section { padding: 14px 14px 10px; border-bottom: 1px solid var(--border); }
  .sidebar-section h4 { font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 10px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text); margin-bottom: 7px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  /* ── STATS ── */
  #stats-content { font-size: 12px; line-height: 2; }
  .stat-row { display: flex; justify-content: space-between; }
  .stat-row .num { font-weight: 600; }

  /* ── LAYER PANEL ── */
  #layer-section { display: none; }
  #layer-section .layer-toolbar { display: flex; gap: 4px; margin-bottom: 8px; }
  #layer-section .layer-toolbar button {
    flex: 1; height: 24px; border-radius: 4px; border: 1px solid var(--border2);
    background: var(--bg); color: var(--text2); font-size: 10px; cursor: pointer;
    transition: all .15s;
  }
  #layer-section .layer-toolbar button:hover:not(:disabled) { background: var(--bg3); color: var(--text); }
  #layer-section .layer-toolbar button:disabled { opacity: 0.4; cursor: default; }
  #layer-list { max-height: 260px; overflow-y: auto; overflow-x: hidden; }
  .layer-item {
    display: flex; align-items: center; gap: 5px; font-size: 11px;
    padding: 2px 0; cursor: pointer; line-height: 1.3;
  }
  .layer-item:hover { background: var(--bg3); }
  .layer-item input[type="checkbox"] {
    width: 13px; height: 13px; margin: 0; flex-shrink: 0; cursor: pointer;
    accent-color: var(--green);
  }
  .layer-color { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; border: 1px solid rgba(0,0,0,0.1); }
  .layer-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
  .layer-count { font-size: 9px; color: var(--text3); flex-shrink: 0; min-width: 20px; text-align: right; }

  /* ── PROP PANEL ── */
  #prop-panel { padding: 14px; flex: 1; overflow-y: auto; display: none; }
  #prop-panel h4 { font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 12px; }
  .prop-row { margin-bottom: 10px; }
  .prop-row label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .prop-row input, .prop-row select {
    width: 100%; height: 30px; padding: 0 8px; border: 1px solid var(--border2);
    border-radius: 6px; font-size: 12px; background: var(--bg); color: var(--text);
  }
  .prop-row textarea { width: 100%; padding: 6px 8px; border: 1px solid var(--border2); border-radius: 6px; font-size: 12px; resize: none; }
  .del-btn { width: 100%; height: 30px; border-radius: 6px; border: 1px solid rgba(229,74,74,0.3); color: #a32d2d; background: none; font-size: 12px; cursor: pointer; margin-top: 4px; }
  .del-btn:hover { background: #fcebeb; }

  /* ── STATUS BAR ── */
  #statusbar {
    height: var(--statusbar-h); background: var(--accent);
    display: flex; align-items: center; padding: 0 14px;
    gap: 16px; flex-shrink: 0;
  }
  #statusbar span { font-size: 11px; color: rgba(255,255,255,0.5); }
  #statusbar .hi { color: rgba(255,255,255,0.8); }
  #scale-info { color: var(--green) !important; }

  /* ── WELCOME ── */
  #welcome {
    position: absolute; inset: 0; display: flex;
    flex-direction: column; align-items: center; justify-content: center;
    pointer-events: none;
  }
  #welcome.hidden { display: none; }
  #welcome .icon { font-size: 48px; margin-bottom: 16px; opacity: .3; }
  #welcome h2 { font-size: 16px; font-weight: 500; color: var(--text2); margin-bottom: 8px; }
  #welcome p { font-size: 13px; color: var(--text3); }
  #drop-hint {
    display: none; position: absolute; inset: 0;
    background: rgba(75, 201, 138, 0.12);
    border: 3px dashed var(--green); border-radius: 8px;
    align-items: center; justify-content: center;
    font-size: 18px; color: var(--green); font-weight: 600;
    z-index: 10;
  }
  #drop-hint.show { display: flex; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="logo">NEED!<span>FLEA</span></div>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="document.getElementById('file-input').click()">
    📂 导入 DXF/DWG
  </button>
  <input type="file" id="file-input" accept=".dxf,.DXF,.dwg,.DWG" onchange="loadCADFile(this)">
  <button class="tb-btn" id="btn-calib" onclick="startCalib()" disabled>
    📐 定比例尺
  </button>
  <div class="tb-sep"></div>

  <!-- TOOL BUTTONS -->
  <button class="tb-btn active" id="btn-select" onclick="setTool('select')">▷ 选择</button>
  <button class="tb-btn" id="btn-booth" onclick="setTool('booth')">⬜ 帐篷</button>
  <div id="cat-picker">
    <div class="cat-dot active" style="background:#5B8FE8" data-cat="二手" title="二手" onclick="selectCat(this)"></div>
    <div class="cat-dot" style="background:#4BC98A" data-cat="HAOCHI" title="HAOCHI" onclick="selectCat(this)"></div>
    <div class="cat-dot" style="background:#F07A4A" data-cat="VINTAGE" title="VINTAGE" onclick="selectCat(this)"></div>
    <div class="cat-dot" style="background:#E85FA3" data-cat="原创设计" title="原创设计" onclick="selectCat(this)"></div>
    <div class="cat-dot" style="background:#F5C842" data-cat="WORKSHOP" title="WORKSHOP" onclick="selectCat(this)"></div>
    <div class="cat-dot" style="background:#9B7FD4" data-cat="其他" title="其他" onclick="selectCat(this)"></div>
  </div>
  <select id="size-select" title="帐篷尺寸">
    <option value="2x2">2×2m</option>
    <option value="2x4">2×4m</option>
    <option value="3x3">3×3m</option>
    <option value="1x1">1×1m</option>
  </select>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-guard" onclick="setTool('guard')">👮 安保</button>
  <button class="tb-btn" id="btn-arrow" onclick="setTool('arrow')">→ 动线</button>
  <button class="tb-btn" id="btn-zone" onclick="setTool('zone')">T 文字</button>
  <button class="tb-btn" id="btn-line" onclick="setTool('line')">✏ 画线</button>
  <select id="line-style" title="线条样式">
    <option value="solid">实线</option>
    <option value="dashed">虚线</option>
  </select>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-measure" onclick="setTool('measure')">📏 测距</button>
  <button class="tb-btn" id="btn-dim" onclick="setTool('dim')">📐 标距</button>
  <button class="tb-btn" id="btn-area" onclick="setTool('area')">⬡ 测面积</button>
  <button class="tb-btn" id="btn-eraser" onclick="setTool('eraser')">🧹 橡皮擦</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="batchNumber()">🔢 批量编号</button>

  <div class="tb-spacer"></div>
  <button class="tb-btn" onclick="saveProject()">💾 保存</button>
  <button class="tb-btn" onclick="document.getElementById('load-input').click()">📂 载入</button>
  <input type="file" id="load-input" accept=".json" onchange="loadProject(this)" style="display:none">
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-theme" onclick="toggleTheme()">☀ 白底</button>
  <button class="tb-btn" onclick="exportPNG()">💾 全图</button>
  <button class="tb-btn" onclick="setTool('crop')">✂ 截取</button>
  <button class="tb-btn" onclick="exportDXF()">📤 DXF</button>
  <button class="tb-btn danger" onclick="clearAnnotations()">🗑 清空</button>
</div>

<!-- MAIN -->
<div id="main">
  <!-- CANVAS -->
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>

    <!-- WELCOME -->
    <div id="welcome">
      <div class="icon">📐</div>
      <h2>拖入 DXF/DWG 文件开始</h2>
      <p>或点击左上角「导入 DXF/DWG」按钮</p>
    </div>
    <div id="drop-hint">松开鼠标导入 DXF/DWG</div>

    <!-- CALIBRATION OVERLAY -->
    <div id="calib-overlay">
      <div id="calib-box">
        <h3>📐 设定比例尺</h3>
        <p>在CAD图上点选两个已知距离的点，输入它们之间的真实长度，工具将自动计算比例尺。</p>
        <div class="step"><div class="step-num">1</div><div>点击第一个参考点（如通道起点）</div></div>
        <div class="step"><div class="step-num">2</div><div>点击第二个参考点（如通道终点）</div></div>
        <div class="step"><div class="step-num">3</div><div>输入两点真实距离，点击确认</div></div>
        <div class="calib-input-row">
          <label>两点距离</label>
          <input type="number" id="calib-dist" value="10" min="0.1" step="0.1">
          <span>米</span>
        </div>
        <div id="calib-status">等待点击第一个参考点…</div>
        <div class="calib-btns">
          <button class="cancel" onclick="cancelCalib()">取消</button>
          <button class="ok" id="calib-ok" onclick="confirmCalib()" disabled>确认比例尺</button>
        </div>
      </div>
    </div>
  </div>

  <!-- BATCH NUMBER DIALOG -->
  <div id="batch-overlay" style="display:none;position:absolute;inset:0;background:rgba(0,0,0,0.55);z-index:50;align-items:center;justify-content:center;">
    <div style="background:var(--bg2);border-radius:12px;padding:24px 28px;width:300px;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
      <h3 style="font-size:15px;font-weight:600;margin-bottom:12px;">🔢 批量编号</h3>
      <p id="batch-info" style="font-size:12px;color:var(--text2);margin-bottom:14px;"></p>
      <div style="display:flex;gap:10px;margin-bottom:12px;">
        <div style="flex:1">
          <label style="font-size:11px;color:var(--text2);display:block;margin-bottom:4px;">区域字母</label>
          <select id="batch-letter" style="width:100%;height:32px;padding:0 8px;border:1px solid var(--border2);border-radius:6px;font-size:14px;">
          </select>
        </div>
        <div style="flex:1">
          <label style="font-size:11px;color:var(--text2);display:block;margin-bottom:4px;">起始编号</label>
          <input type="number" id="batch-start" value="1" min="1" max="999" style="width:100%;height:32px;padding:0 8px;border:1px solid var(--border2);border-radius:6px;font-size:14px;">
        </div>
      </div>
      <p id="batch-preview" style="font-size:12px;color:var(--text3);margin-bottom:14px;"></p>
      <div style="display:flex;gap:8px;">
        <button onclick="cancelBatchNumber()" style="flex:1;height:34px;border-radius:7px;font-size:13px;cursor:pointer;border:1px solid var(--border2);background:none;">取消</button>
        <button onclick="confirmBatchNumber()" style="flex:1;height:34px;border-radius:7px;font-size:13px;cursor:pointer;border:1px solid var(--accent);background:var(--accent);color:#fff;">确认编号</button>
      </div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-section">
      <h4>图例</h4>
      <div id="legend-list"></div>
      <div style="display:flex;gap:4px;margin-top:6px;">
        <input type="color" id="new-cat-color" value="#FF6600" title="选择颜色" style="width:26px;height:26px;padding:0;border:1px solid var(--border2);border-radius:5px;cursor:pointer;background:none;">
        <button onclick="addCategory()" style="flex:1;height:26px;border-radius:5px;border:1px dashed var(--border2);background:none;color:var(--text3);font-size:11px;cursor:pointer;">+ 新增类型</button>
      </div>
    </div>

    <div class="sidebar-section">
      <h4>统计</h4>
      <div id="stats-content">
        <div class="stat-row" style="color:var(--text3);font-style:italic">暂无摊位</div>
      </div>
    </div>

    <div class="sidebar-section" id="layer-section" style="display:none">
      <h4>图层</h4>
      <div class="layer-toolbar">
        <button id="btn-layer-all" onclick="setAllLayersVisible(true)">全选</button>
        <button id="btn-layer-none" onclick="setAllLayersVisible(false)">全不选</button>
      </div>
      <div id="layer-list"></div>
    </div>

    <div id="prop-panel">
      <h4>属性</h4>
      <div id="prop-content"></div>
    </div>
  </div>
</div>

<!-- STATUS BAR -->
<div id="statusbar">
  <span id="tool-hint" class="hi">拖入 DXF/DWG 文件或点击「导入 DXF/DWG」</span>
  <span>|</span>
  <span id="scale-info">比例尺未设定</span>
  <span>|</span>
  <span id="coord-info">—</span>
  <span>|</span>
  <span id="zoom-info">缩放 100%</span>
</div>

<script src="libdxfrw.js"></script>
<script src="dxf-parser.js?v=7"></script>
<script src="renderer.js?v=7"></script>
<script src="booth.js?v=7"></script>
<script src="app.js?v=13"></script>
</body>
</html>
